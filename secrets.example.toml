# Paste these values into Streamlit Cloud > Manage app > Settings > Secrets.
APP_MODE = "demo" # change to "clinical" after OIDC + remote database are configured
DATABASE_URL = "postgresql+psycopg://USER:PASSWORD@HOST:5432/postgres?sslmode=require"
HOSPITAL_NAME = "General Surgery Department"
TIMEZONE = "Asia/Baghdad"

# Optional OIDC login (Google or Microsoft Entra ID)
[auth]
redirect_uri = "https://YOUR-APP.streamlit.app/oauth2callback"
cookie_secret = "GENERATE_A_LONG_RANDOM_SECRET"
client_id = "YOUR_CLIENT_ID"
client_secret = "YOUR_CLIENT_SECRET"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
